name: IPTV爬虫 - 自动运行

on:
  # UTC定时：每2小时执行（北京时间+8小时）
  schedule:
    - cron: '0 */2 * * *'
  # 仓库手动点Run workflow触发
  workflow_dispatch:

jobs:
  crawler:
    runs-on: ubuntu-latest
    steps:
      # 1.拉取代码
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # 2.python环境
      - name: 🐍 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3.安装依赖
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4.执行爬虫
      - name: 🕷️ 运行爬虫
        run: python crawler.py

      # 5.对比源文件是否变更
      - name: 📋 检查文件变化
        id: check_changes
        run: |
          if git diff --quiet iptv_sources.txt iptv_sources.m3u crawler.log 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # 6.git配置
      - name: 🔧 配置Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"

      # 7.添加变更文件
      - name: ➕ 添加更改
        run: |
          git add iptv_sources.txt iptv_sources.m3u crawler.log || true

      # 8.commit提交
      - name: 💾 提交更改
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "🔄 自动更新直播源 - $(date '+%Y-%m-%d %H:%M:%S UTC')" || echo "无实际变更跳过提交"

      # 9.推送仓库【修复：固定版本】
      - name: 🚀 推送代码
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

      # 10.自动Release打包源文件
      - name: 📦 创建发布
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            iptv_sources.txt
            iptv_sources.m3u
          tag_name: release-${{ github.run_number }}
          generate_release_notes: false
          body: |
            ⏰ UTC更新时间: ${{ github.event.schedule }}
            🔄 Action运行编号: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11.工作流汇总输出
      - name: 📊 生成运行摘要
        if: always()
        run: |
          echo "## 🕷️ IPTV爬虫运行完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ UTC运行时间: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 运行号: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 分支: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f iptv_sources.txt ]; then
            SOURCE_COUNT=$(($(wc -l < iptv_sources.txt)-1))
            echo "- 📺 TXT源总数: $SOURCE_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f iptv_sources.m3u ]; then
            M3U_COUNT=$(grep -c "^#EXTINF" iptv_sources.m3u || echo 0)
            echo "- 🎬 M3U频道数: $M3U_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 直链订阅" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/iptv_sources.m3u" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
